name: tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_COLOR: 1
  PY_COLORS: 1
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  tests:
    runs-on: ubuntu-latest
    name: run tests (${{ matrix.python-version }})
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            uv-python-version: "3.10"
          - python-version: "3.11"
            uv-python-version: "3.11"
          - python-version: "3.12"
            uv-python-version: "3.12"
          - python-version: "3.13"
            uv-python-version: "3.13"
          - python-version: "3.14"
            uv-python-version: "3.14"
          - python-version: "3.15-dev"
            uv-python-version: "3.15"
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.uv-python-version }}
      - run: uv run --frozen pytest test_stubdefaulter.py
